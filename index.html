<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AliePlay</title>

<style>

body{
background:#070721;
color:white;
font-family:Arial;
text-align:center;
}

.logo{
width:200px;
margin-top:40px;
}

.planos{
display:flex;
justify-content:center;
gap:30px;
margin-top:40px;
flex-wrap:wrap;
}

.plano{
background:#12123a;
padding:30px;
border-radius:15px;
width:200px;
}

.preco{
font-size:32px;
color:#ff00cc;
}

button{
background:linear-gradient(90deg,#ff00cc,#00c3ff);
border:none;
padding:12px 25px;
border-radius:25px;
color:white;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<img src="logo.png" class="logo">

<h1>AliePlay</h1>

<p>Aperte o play e aproveite.</p>

<div class="planos">

<div class="plano">
<h2>Mensal</h2>
<div class="preco">R$25</div>
<button onclick="pagar(25)">Pagar com Pix</button>
</div>

<div class="plano">
<h2>3 Meses</h2>
<div class="preco">R$60</div>
<button onclick="pagar(60)">Pagar com Pix</button>
</div>

<div class="plano">
<h2>6 Meses</h2>
<div class="preco">R$100</div>
<button onclick="pagar(100)">Pagar com Pix</button>
</div>

<div class="plano">
<h2>1 Ano</h2>
<div class="preco">R$150</div>
<button onclick="pagar(150)">Pagar com Pix</button>
</div>

</div>

<script>

async function pagar(valor){

const res = await fetch("/pix",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({valor})

})

const dados = await res.json()

window.location.href = dados.url

}

</script>

</body>
</html>
